<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Guide de lithothérapie — vertus, chakras et astrologie des pierres naturelles et cristaux.">
  <title>Lithothérapie — Guide des pierres naturelles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-left">
      <h1>🔮 Lithothérapie</h1>
      <p class="tagline">Guide des pierres naturelles</p>
    </div>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="sq" type="search" placeholder="Pierre, signe, vertu…"
             oninput="render()" aria-label="Rechercher une pierre">
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="main">
    <nav class="filters" id="filters" aria-label="Filtrer par catégorie"></nav>
    <div class="grid" id="grid" role="list"></div>
    <p class="nores" id="nores" style="display:none" aria-live="polite">
      Aucune pierre trouvée.
    </p>
  </main>

  <!-- ── Modal ── -->
  <div class="overlay" id="ov" role="dialog" aria-modal="true"
       aria-labelledby="modal-title" onclick="closeModal(event)">
    <div class="modal" id="mbox"></div>
  </div>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <p>Lithothérapie · Guide des pierres naturelles &amp; cristaux</p>
    <p class="disclaimer">Les informations présentées sont à titre informatif uniquement.</p>
  </footer>

  <script src="données.js"></script>
  <script src="app.js"></script>
</body>
</html>
